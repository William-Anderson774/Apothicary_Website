<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Routes</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      margin: 20px;
      background-color: antiquewhite;
      border: 2px solid black;
      padding: 60px 80px;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    p { color: #333; font-size: 12px; margin-bottom: 4px; text-align: center; border: 2px solid #333; padding: 4px; }
    a { text-decoration: none; color: #333; font-size: 12px; }
    h2 { font-family: 'Georgia', serif; font-style: italic; font-size: 11px; letter-spacing: 2px; color: #888; text-align: center; margin-top: 8px; }
    h4 { font-size: 24px; color: #333; text-align: center; letter-spacing: 1px; margin-bottom: 0; }
    h5 { font-size: 10px; color: #817e7e; text-align: left; margin-top: 8px; letter-spacing: 1px; line-height: 1.6; }

    .nav-bar { position: absolute; top: 20px; left: 65px; right: 65px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

    .progress-track { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(80,60,40,0.15); z-index: 9999; }
    .progress-fill { height: 100%; width: 0%; background: #6b4c1e; transition: width 0.1s ease; position: relative; }
    .progress-fill::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: #6b4c1e; }
    .progress-label { position: fixed; top: 8px; right: 70px; font-family: 'Georgia', serif; font-style: italic; font-size: 10px; letter-spacing: 1.5px; color: #6b4c1e; opacity: 0.7; z-index: 9999; }

    .rotating-badge { position: fixed; top: 20%; left: 50%; transform: translate(-50%,-50%); z-index: 100; }
    .rotating-badge svg { animation: spin 12s linear infinite; }
    .circle-text { font-family: 'Georgia', serif; font-style: italic; fill: #1a1a1a; text-transform: uppercase; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .page-header { text-align: center; margin: 110px 0 32px; }

    
    #map-container { position: relative; width: 100%; border: 1px solid #333; overflow: hidden; line-height: 0; }
    #map-container img { width: 100%; display: block; opacity: 0.75; }

 
    .dot {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      transform: translate(-50%, -50%); cursor: pointer;
      border: 2px solid antiquewhite; transition: transform 0.15s; z-index: 10;
    }
    .dot:hover { transform: translate(-50%, -50%) scale(1.5); }
    .dot.materia { background: #6b4c1e; }
    .dot.trade   { background: #9a7a5e; }

    
    .herb-card {
      position: absolute;
      background: antiquewhite;
      border: 1px solid #333;
      padding: 18px 20px;
      width: 230px;
      box-sizing: border-box;
      font-family: 'Georgia', serif;
      pointer-events: none;
      display: none;
      z-index: 200;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
      line-height: normal;
    }
    .card-stamp        { display: block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin: 0 0 8px 0; }
    .card-name         { display: block; font-size: 15px; font-weight: bold; color: #1a1a1a; margin: 0 0 5px 0; line-height: 1.3; }
    .card-latin        { display: block; font-style: italic; font-size: 10px; color: #888; margin: 0 0 12px 0; }
    .card-divider      { display: block; border: none; border-top: 1px solid #ddd; margin: 0 0 10px 0; }
    .card-origin-label { display: block; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: #aaa; margin: 0 0 4px 0; }
    .card-origin       { display: block; font-size: 11px; color: #555; font-style: italic; margin: 0 0 10px 0; line-height: 1.5; }
    .card-info         { display: block; font-size: 11px; color: #444; line-height: 1.75; margin: 0; }

    @media (max-width: 640px) {
      body { padding: 40px 20px; }
      .nav-bar { left: 20px; right: 20px; }

      .herb-card {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%;
        max-height: 55vh;
        overflow-y: auto;
        border-left: none; border-right: none; border-bottom: none;
        border-top: 2px solid #333;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
        padding: 20px 24px 32px;
        pointer-events: auto;
        -webkit-overflow-scrolling: touch;
      }

      .dot { width: 14px; height: 14px; }
    }

    .map-legend { display: flex; gap: 24px; margin-top: 14px; justify-content: flex-end; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-family: 'Georgia', serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #888; }
    .legend-dot  { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid antiquewhite; }
    .legend-dot.materia { background: #6b4c1e; }
    .legend-dot.trade   { background: #9a7a5e; }

    body.dark { background-color: #1a1410; border-color: #5a4a35; color: #d4c4a8; }
    body.dark p { color: #d4c4a8; border-color: #5a4a35; }
    body.dark a { color: #d4c4a8; }
    body.dark .circle-text { fill: #d4c4a8; }
    body.dark .progress-fill, body.dark .progress-fill::after { background: #c4a882; }
    body.dark .progress-label { color: #c4a882; }
    body.dark h2, body.dark h4, body.dark h5 { color: #d4c4a8; }
    body.dark #map-container { border-color: #5a4a35; }
    body.dark #map-container img { opacity: 0.35; filter: invert(1); }
    body.dark .dot { border-color: #1a1410; }
    body.dark .herb-card { background: #1a1410; border-color: #5a4a35; }
    body.dark .card-name { color: #e0d0b0; }
    body.dark .card-info { color: #b0a080; }
    body.dark .card-origin { color: #8a7050; }
    body.dark .card-divider { border-color: #3a2e20; }

    .dark-toggle { position: fixed; bottom: 30px; right: 30px; width: 36px; height: 36px; border: 1px solid #333; background: antiquewhite; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: background 0.3s, border-color 0.3s; }
    body.dark .dark-toggle { background: #1a1410; border-color: #5a4a35; filter: invert(1); }

    .footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px; }
    .logo-img { width: 75px; height: auto; }
  </style>
</head>
<body>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-label" id="progressLabel">0%</span>

  <div class="nav-bar">
    <a href="index.html"><p>Back to the beginning</p></a>
    <a href="history.html"><p>History of the Practice</p></a>
    <a href="routes.html"><p>Trade Routes</p></a>
    <a href="recipe.html"><p>Recipes</p></a>
    <a href="about.html"><p>About this site</p></a>
  </div>

  <div class="rotating-badge">
    <svg viewBox="0 0 200 200" width="160" height="160">
      <defs><path id="circle-path" d="M 100,100 m -75,0 a 75,75 0 1,1 150,0 a 75,75 0 1,1 -150,0"/></defs>
      <text class="circle-text"><textPath href="#circle-path" startOffset="0%">· APOTHECARY · APOTHECARY · APOTHECARY ·</textPath></text>
    </svg>
  </div>
<br>

  <div class="page-header">
    <h4>· ORIGINS & TRADE ROUTES ·</h4>
    <h2>Where the ingredients came from</h2>
  </div>

  <div id="map-container">
    <img src="world-map.png" alt="World map outline">
    <div class="herb-card" id="herb-card">
      <span class="card-stamp"  id="card-stamp"></span>
      <div class="card-name"   id="card-name"></div>
      <div class="card-latin"  id="card-latin"></div>
      <hr class="card-divider">
      <div class="card-origin-label">Origin</div>
      <div class="card-origin" id="card-origin"></div>
      <div class="card-info"   id="card-info"></div>
    </div>
  </div>

  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot materia"></div>Materia Medica</div>
    <div class="legend-item"><div class="legend-dot trade"></div>Trade Ingredients</div>
  </div>

  <br><br>
  <hr>
  <div class="footer">
    <div>
      <h5>· APOTHECARY ·</h5>
      <h5>All Rights Reserved</h5>
      <h5>William Anderson · 2026</h5>
    </div>
    <img class="logo-img" src="LogoImg.png" alt="Apothecary Logo">
  </div>

  <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">☽</button>

  <script>
  
    const herbs = [
      { name:'Lavender',         latin:'Lavandula angustifolia', lon:5.5,   lat:43.8,  type:'materia', origin:'Provence, France',           info:'Cultivated in the hills of Provence since the Roman era. Traded across Europe for its oils and medicinal preparations.' },
      { name:'Chamomile',        latin:'Matricaria chamomilla',  lon:13.4,  lat:52.5,  type:'materia', origin:'Central Europe',              info:'Widely cultivated in Germany and Hungary by the 18th century. One of the most traded dried herbs across Europe.' },
      { name:'Echinacea',        latin:'Echinacea purpurea',     lon:-96,   lat:38,    type:'materia', origin:'Great Plains, N. America',    info:'Used by Plains peoples for centuries before European contact. Reached European apothecaries in the 19th century.' },
      { name:'Peppermint',       latin:'Mentha × piperita',      lon:-1,    lat:52,    type:'materia', origin:'England',                     info:'A hybrid first cultivated in England in the 17th century. Mitcham, Surrey became the world\'s leading producer.' },
      { name:"St. John's Wort",  latin:'Hypericum perforatum',   lon:14,    lat:42,    type:'materia', origin:'Mediterranean Europe',        info:'Used medicinally since ancient Greece. Named for its midsummer bloom near the feast of St. John the Baptist.' },
      { name:'Calendula',        latin:'Calendula officinalis',  lon:5,     lat:36,    type:'materia', origin:'Mediterranean Basin',         info:'Cultivated since antiquity. Roman and Arab physicians used it widely as a wound herb and skin treatment.' },
      { name:'Elderberry',       latin:'Sambucus nigra',         lon:10,    lat:51,    type:'materia', origin:'Northern Europe',             info:'Native throughout Europe. One of the most comprehensively used plants in the apothecary tradition.' },
      { name:'Rosemary',         latin:'Salvia rosmarinus',      lon:3,     lat:42,    type:'materia', origin:'Mediterranean coast',         info:'Native to dry Mediterranean coastlines. Associated with memory and used in medicine since ancient Rome.' },
      { name:'Ginger',           latin:'Zingiber officinale',    lon:88,    lat:22,    type:'materia', origin:'Eastern India / Bengal',      info:'One of the earliest traded spices. Arab merchants controlled its routes to Europe for centuries.' },
      { name:'Turmeric',         latin:'Curcuma longa',          lon:78,    lat:17,    type:'materia', origin:'South India',                 info:'Native to the Indian subcontinent, traded via the Silk Road and by sea from the 13th century onward.' },
      { name:'Lemon Balm',       latin:'Melissa officinalis',    lon:30,    lat:40,    type:'materia', origin:'S. Europe / W. Asia',         info:'Indigenous to the eastern Mediterranean and western Asia. Spread across Europe by the Romans.' },
      { name:'Yarrow',           latin:'Achillea millefolium',   lon:20,    lat:50,    type:'materia', origin:'Eurasia',                     info:'One of the most widely distributed medicinal herbs in the Northern Hemisphere. Used since prehistoric times.' },
      { name:'Milk Thistle',     latin:'Silybum marianum',       lon:12,    lat:39,    type:'materia', origin:'Mediterranean / Middle East', info:'Native to the Mediterranean and Middle East. Cultivated across European gardens from the Middle Ages.' },
      { name:'Marshmallow Root', latin:'Althaea officinalis',    lon:42,    lat:40,    type:'materia', origin:'Western Asia',                info:'Native to western Asia and eastern Europe. Spread along trade routes into the Mediterranean and northern Europe.' },
      { name:'Cinnamon',         latin:'Cinnamomum verum',       lon:80.7,  lat:7.8,   type:'trade',   origin:'Sri Lanka',                   info:'One of the most valuable spices of the ancient world. Ceylon held the monopoly, controlled by Arab, then Portuguese and Dutch merchants.' },
      { name:'Cloves',           latin:'Syzygium aromaticum',    lon:127.8, lat:-0.7,  type:'trade',   origin:'Maluku Islands, Indonesia',   info:'The Spice Islands were the world\'s only source of cloves until the 18th century. Used for pain, digestion, and preservation.' },
      { name:'Cardamom',         latin:'Elettaria cardamomum',   lon:76,    lat:10,    type:'trade',   origin:'Malabar Coast, SW India',     info:'Known as the "Queen of Spices." Travelled ancient spice routes from India through Arabia to Europe.' },
      { name:'Saffron',          latin:'Crocus sativus',         lon:54,    lat:36,    type:'trade',   origin:'Persia / Iran',               info:'The world\'s most expensive spice by weight, cultivated in Persia for over 3,000 years. Used for mood and digestion.' },
      { name:'Frankincense',     latin:'Boswellia sacra',        lon:55,    lat:17,    type:'trade',   origin:'Arabia / Horn of Africa',     info:'Harvested from Boswellia trees in Oman and the Horn of Africa. Traded along the ancient Incense Route.' },
      { name:'Opium Poppy',      latin:'Papaver somniferum',     lon:33,    lat:38,    type:'trade',   origin:'Anatolia / Asia Minor',       info:'Cultivated in Asia Minor since at least 3400 BCE. One of the most powerful medicinal plants in the apothecary tradition.' },
    ];

    const container = document.getElementById('map-container');
    const card      = document.getElementById('herb-card');

    herbs.forEach(herb => {
      const x = ((herb.lon + 180) / 360) * 100;
      const y = ((90 - herb.lat) / 180) * 100;

      const dot = document.createElement('div');
      dot.className = `dot ${herb.type}`;
      dot.style.left = x + '%';
      dot.style.top  = y + '%';

      function showCard(e, clientX, clientY) {
        document.getElementById('card-stamp').textContent  = herb.type === 'materia' ? 'Materia Medica' : 'Trade Route';
        document.getElementById('card-name').textContent   = herb.name;
        document.getElementById('card-latin').textContent  = herb.latin;
        document.getElementById('card-origin').textContent = herb.origin;
        document.getElementById('card-info').textContent   = herb.info;

        const isMobile = window.innerWidth <= 640;
        if (isMobile) {
        
          card.style.left = '';
          card.style.top  = '';
        } else {
          const rect = container.getBoundingClientRect();
          let cx = clientX - rect.left + 14;
          let cy = clientY - rect.top  + 14;
          if (cx + 250 > rect.width)  cx = clientX - rect.left - 250;
          if (cy + 260 > rect.height) cy = clientY - rect.top  - 260;
          card.style.left = cx + 'px';
          card.style.top  = cy + 'px';
        }
        card.style.display = 'block';
      }

      dot.addEventListener('mousemove', function(e) { showCard(e, e.clientX, e.clientY); });
      dot.addEventListener('mouseout',  () => { if (window.innerWidth > 640) card.style.display = 'none'; });
      dot.addEventListener('click',     function(e) {
        e.stopPropagation();
        showCard(e, e.clientX, e.clientY);
      });
      container.appendChild(dot);
    });

   
    document.addEventListener('click', function(e) {
      if (!e.target.classList.contains('dot')) card.style.display = 'none';
    });

    window.addEventListener('scroll', function () {
      const pct = Math.round((window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = pct + '%';
    });

    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', function(e) {
        const href = this.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('http')) return;
        e.preventDefault();
        document.body.style.transition = 'opacity 0.4s ease';
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = href; }, 400);
      });
    });

    const toggle = document.getElementById('darkToggle');
    if (localStorage.getItem('darkMode') === 'on') {
      document.body.classList.add('dark');
      toggle.textContent = '☀';
    }
    toggle.addEventListener('click', function() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('darkMode', isDark ? 'on' : 'off');
      this.textContent = isDark ? '☀' : '☽';
    });
  </script>

</body>
</html>
